groups:
  - name: mts-platform
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus can't scrape {{ $labels.job }} ({{ $labels.instance }}) for over 1 minute."

      - alert: HighAPIErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "The backend is returning 5xx responses at {{ $value | printf \"%.2f\" }}/sec over the last 5 minutes."

      - alert: HighAPILatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency (p95 > 2s)"
          description: "p95 request latency has been above 2s for 5 minutes."

      - alert: HighContainerMemory
        expr: container_memory_usage_bytes{name=~"mts-.*"} > 1.5e9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.name }} is using over 1.5GB of memory"
          description: "{{ $labels.name }} memory usage has been above 1.5GB for 10 minutes."

      - alert: HighHostMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Host memory usage above 90%"
          description: "Available memory has been below 10% for 10 minutes."

      - alert: LowDiskSpace
        # mountpoint is "/" on a plain Linux host; under Docker Desktop's
        # WSL2 VM the real underlying disk instead shows up as "/var/lib".
        expr: |
          (node_filesystem_avail_bytes{mountpoint=~"^/$|^/var/lib$"} / node_filesystem_size_bytes{mountpoint=~"^/$|^/var/lib$"}) < 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.mountpoint }}"
          description: "Less than 10% disk space remaining on {{ $labels.mountpoint }}."

      - alert: TooManyPostgresConnections
        expr: sum(pg_stat_activity_count) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Postgres connection count"
          description: "Postgres has {{ $value }} active connections, sustained for 5 minutes."
