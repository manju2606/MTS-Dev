apiVersion: v1
kind: Secret
metadata:
  name: mts-secrets
  namespace: mts
type: Opaque
stringData:
  # Generate: python -c "import secrets; print(secrets.token_hex(32))"
  SECRET_KEY: "change-me-to-a-random-32-char-secret-key"
  POSTGRES_PASSWORD: "mts_password"
  DATABASE_URL: "postgresql+asyncpg://mts:mts_password@postgres:5432/mts_dev"
  REDIS_URL: "redis://redis:6379"
  MONGODB_URL: "mongodb://mongodb:27017"
