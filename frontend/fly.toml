app = "mts-frontend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    # Must match the backend app URL — update after deploying backend
    NEXT_PUBLIC_API_URL = "https://mts-backend.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
