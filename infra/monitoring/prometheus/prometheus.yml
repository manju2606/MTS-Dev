global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: mongodb
    static_configs:
      - targets: ["mongodb-exporter:9216"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Kubernetes cluster (local kind cluster "mts-dev") ───────────────────────
  # Prometheus is attached to the "kind" Docker network (see
  # docker-compose.prod.yml) so it can reach these by node container name.
  - job_name: kube-state-metrics
    static_configs:
      - targets: ["mts-dev-control-plane:30080"]

  - job_name: k8s-nodes
    static_configs:
      - targets:
          - "mts-dev-control-plane:9100"
          - "mts-dev-worker:9100"
          - "mts-dev-worker2:9100"
